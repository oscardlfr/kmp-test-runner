name: Publish Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to publish (e.g. v0.3.0)'
        required: true
  workflow_call:
    inputs:
      tag:
        description: 'Release tag to publish (e.g. v0.3.0)'
        required: true
        type: string

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # When invoked via workflow_call (from auto-tag.yml) or workflow_dispatch,
          # check out the tag explicitly so the build runs against the right commit.
          # When triggered by the tag push itself (push:tags:), GITHUB_REF_NAME is the
          # tag and the default checkout is fine.
          ref: ${{ inputs.tag || github.ref }}

      - name: Determine version
        id: version
        run: |
          # Three trigger paths, all need to resolve to the same TAG/VER:
          #   - push: tags:  → use GITHUB_REF_NAME ("vX.Y.Z")
          #   - workflow_dispatch → use github.event.inputs.tag
          #   - workflow_call    → use inputs.tag (passed by the calling workflow)
          if [ -n "${{ inputs.tag }}" ]; then
            TAG="${{ inputs.tag }}"
          else
            TAG="${GITHUB_REF_NAME}"
          fi
          VER="${TAG#v}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "ver=${VER}" >> "$GITHUB_OUTPUT"

      - name: Build artifacts
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          VER="${{ steps.version.outputs.ver }}"

          # Wrapper directory matches what install.sh (--strip-components=1) and
          # install.ps1 ("strip top-level dir") expect. v0.3.0 was missing this
          # wrapper, which broke extraction. See CHANGELOG v0.3.1.
          WRAPPER="kmp-test-runner-${VER}"
          STAGING="staging-${VER}/${WRAPPER}"
          mkdir -p "${STAGING}"

          # package.json is required at runtime — cli.js reads version from it.
          # v0.3.0 + v0.3.1 omitted this, breaking `kmp-test --version` post-install.
          cp -r bin lib scripts LICENSE CHANGELOG.md package.json "${STAGING}/"

          # Linux tarball — wrapper dir present at top level
          LINUX_ARCHIVE="kmp-test-runner-${VER}-linux.tar.gz"
          tar -czf "${LINUX_ARCHIVE}" -C "staging-${VER}" "${WRAPPER}"
          echo "linux_archive=${LINUX_ARCHIVE}" >> "$GITHUB_ENV"

          # Windows zip — wrapper dir present at top level
          WINDOWS_ARCHIVE="kmp-test-runner-${VER}-windows.zip"
          (cd "staging-${VER}" && zip -r "../${WINDOWS_ARCHIVE}" "${WRAPPER}")
          echo "windows_archive=${WINDOWS_ARCHIVE}" >> "$GITHUB_ENV"

          rm -rf "staging-${VER}"

      - name: Extract release notes
        run: |
          VER="${{ steps.version.outputs.ver }}"
          awk "/^## \[${VER}\]/{found=1; next} found && /^## \[/{exit} found{print}" CHANGELOG.md > release-notes.txt
          if [ ! -s release-notes.txt ]; then
            echo "No release notes found for version ${VER} in CHANGELOG.md" >&2
            exit 1
          fi

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          gh release create "${TAG}" \
            --title "${TAG}" \
            --notes-file release-notes.txt \
            "${{ env.linux_archive }}" \
            "${{ env.windows_archive }}"
