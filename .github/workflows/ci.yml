name: CI
on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - name: npm audit
        run: npm audit --audit-level=high
        continue-on-error: false
      - name: shellcheck
        if: matrix.os == 'ubuntu-latest'
        run: shellcheck --severity=warning --external-sources --exclude=SC2034,SC2053,SC2069 scripts/sh/*.sh scripts/sh/lib/*.sh scripts/install.sh scripts/uninstall.sh
      - name: bats
        if: matrix.os == 'ubuntu-latest'
        run: npx bats tests/bats/ tests/installer/
      - name: Pester
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: Invoke-Pester -Path tests/pester/,tests/installer/ -CI
      - name: vitest
        run: npx vitest run --coverage
  secrets-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: TruffleHog OSS
        uses: trufflesecurity/trufflehog@main
        with:
          extra_args: --only-verified
  installer-e2e:
    needs: build
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Build local artifact (Linux/macOS — both reuse linux.tar.gz)
        if: matrix.os != 'windows-latest'
        run: |
          ARTIFACT_VER="$(node -p "require('./package.json').version")"
          bash scripts/build-artifact.sh "$ARTIFACT_VER" /tmp/kmp-e2e-artifacts
          echo "LOCAL_ARCHIVE=/tmp/kmp-e2e-artifacts/kmp-test-runner-${ARTIFACT_VER}-linux.tar.gz" >> "$GITHUB_ENV"
          echo "ARTIFACT_VER=${ARTIFACT_VER}" >> "$GITHUB_ENV"
      - name: Install npm deps (Linux/macOS — bats via local node_modules)
        if: matrix.os != 'windows-latest'
        run: npm ci
      - name: Run E2E bats tests (Linux/macOS)
        if: matrix.os != 'windows-latest'
        # --filter "E2E" runs the install.sh archive-roundtrip tests only.
        # The non-E2E install.bats tests are static-grep / mocked-uname checks
        # already covered by the ubuntu bats job; no value re-running here.
        run: npx bats tests/installer/install.bats --filter "E2E"
      - name: Run E2E Pester tests (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: Invoke-Pester -Path tests/installer/Install.Tests.ps1 -CI -TagFilter 'E2E'
  gradle-plugin-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Test Gradle plugin
        run: cd gradle-plugin && ./gradlew test
  # v0.7.0 Phase 3 — verify the gradle plugin builds + TestKit suite passes
  # on macOS. Catches mac-specific build/test regressions in the plugin
  # (BSD vs GNU shell tooling, JDK locator differences, etc.) before they
  # reach iOS users. This is informational by default; promote to required
  # in branch protection when the v0.7 line stabilises.
  gradle-plugin-test-ios:
    runs-on: macos-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Test Gradle plugin (macOS)
        run: cd gradle-plugin && ./gradlew test
  # v0.7.x WS-2 — bats parity on macOS. macOS ships /bin/bash 3.2.57 (Apple
  # froze it for licensing). Bash 3.2 lacks `declare -A` and is strict about
  # `"${arr[@]}"` over empty arrays under set -u. The ubuntu-only bats job
  # (line 26-28 above) cannot catch these regressions because Linux runners
  # use bash 5.x. This job mirrors the ubuntu invocation against the system
  # bash on macos-latest, full parity (tests/bats/ + tests/installer/).
  #
  # 2026-05-03 — orphan-adb hang root-caused and fixed (v0.8.0 BACKLOG #6 + #9):
  # `kmp-test doctor`'s adb probe (lib/cli.js#runDoctorChecks) was forking an
  # adb child that inherited Node's pipe FDs, blocking bats from reaching pipe
  # EOF on suite exit (first-run evidence: 227 tests passed in ~3 min, then
  # 8-min hang, then runner-cancel + "Terminate orphan process: pid (...) (adb)").
  # The actual leak source was tests/bats/test-doctor.bats + test-concurrency.bats
  # (the only files invoking `node $CLI doctor`); install.bats was incorrectly
  # blamed in the original investigation. Fixed by KMP_TEST_SKIP_ADB=1 opt-out
  # exported from those two setup_file hooks. tests/installer/ is now back in
  # scope here.
  #
  # Informational by default; promote to required in branch protection
  # alongside gradle-plugin-test-ios when the v0.7 line stabilises.
  bats-macos:
    runs-on: macos-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - name: bats (macOS — Bash 3.2 regression coverage)
        run: npx bats --timing tests/bats/ tests/installer/
