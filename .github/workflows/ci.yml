name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - name: npm audit
        run: npm audit --audit-level=high
        continue-on-error: false
      - name: shellcheck
        if: matrix.os == 'ubuntu-latest'
        run: shellcheck --severity=warning --external-sources --exclude=SC2034,SC2053,SC2069 scripts/sh/*.sh scripts/sh/lib/*.sh scripts/install.sh scripts/uninstall.sh
      - name: bats
        if: matrix.os == 'ubuntu-latest'
        run: npx bats tests/bats/ tests/installer/
      - name: Pester
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: Invoke-Pester -Path tests/pester/,tests/installer/ -CI
      - name: vitest
        run: npx vitest run --coverage
  secrets-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: TruffleHog OSS
        uses: trufflesecurity/trufflehog@main
        with:
          extra_args: --only-verified
  installer-e2e:
    needs: build
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Build local artifact (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          ARTIFACT_VER="$(node -p "require('./package.json').version")"
          bash scripts/build-artifact.sh "$ARTIFACT_VER" /tmp/kmp-e2e-artifacts
          echo "LOCAL_ARCHIVE=/tmp/kmp-e2e-artifacts/kmp-test-runner-${ARTIFACT_VER}-linux.tar.gz" >> "$GITHUB_ENV"
          echo "ARTIFACT_VER=${ARTIFACT_VER}" >> "$GITHUB_ENV"
      - name: Install npm deps (Linux — bats via local node_modules)
        if: matrix.os == 'ubuntu-latest'
        run: npm ci
      - name: Run E2E bats tests (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: npx bats tests/installer/install.bats --filter "E2E"
      - name: Run E2E Pester tests (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: Invoke-Pester -Path tests/installer/Install.Tests.ps1 -CI -TagFilter 'E2E'
  gradle-plugin-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Test Gradle plugin
        run: cd gradle-plugin && ./gradlew test
